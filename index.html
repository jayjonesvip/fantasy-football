<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fantasy Draft Board</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">2026 PPR Draft Research</p>
        <h1>Fantasy Draft Board</h1>
      </div>
      <div class="actions">
        <button id="themeToggle" class="icon-button" title="Toggle theme" aria-label="Toggle theme">◐</button>
        <button id="printOverall" class="primary">Export Overall PDF</button>
        <button id="printPosition" class="secondary">Export Position PDF</button>
      </div>
    </header>

    <main>
      <section class="summary" aria-label="Draft board summary">
        <div>
          <span id="playerCount">0</span>
          <p>Players</p>
        </div>
        <div>
          <span id="updatedAt">-</span>
          <p>Updated</p>
        </div>
        <div>
          <span id="sourceCount">0</span>
          <p>Sources</p>
        </div>
        <div>
          <span id="scoringLabel">PPR</span>
          <p>Scoring</p>
        </div>
      </section>

      <section class="movement" aria-label="Rank movement summary">
        <article class="movement-card movement-up">
          <p>Top Riser</p>
          <div>
            <strong id="topRiserName">-</strong>
            <span id="topRiserMeta">No movement yet</span>
          </div>
          <b id="topRiserDelta">-</b>
        </article>
        <article class="movement-card movement-down">
          <p>Biggest Drop</p>
          <div>
            <strong id="biggestDropName">-</strong>
            <span id="biggestDropMeta">No movement yet</span>
          </div>
          <b id="biggestDropDelta">-</b>
        </article>
      </section>

      <section class="controls">
        <label class="search">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="Search player, team, or position">
        </label>
        <div id="positionTabs" class="tabs" role="tablist"></div>
      </section>

      <section class="board">
        <div class="board-head">
          <div>
            <h2 id="viewTitle">Overall Top 300</h2>
            <p id="viewMeta">Consensus ranks with flexible projected stats.</p>
          </div>
          <div class="board-selectors">
            <label>
              <span>Scoring</span>
              <select id="scoringSelect" aria-label="Scoring format">
                <option value="ppr">PPR</option>
                <option value="half-ppr">Half PPR</option>
                <option value="standard">Standard</option>
              </select>
            </label>
            <label>
              <span>Sort</span>
              <select id="sortSelect" aria-label="Sort players">
                <option value="overallRank">Overall rank</option>
                <option value="positionRank">Position rank</option>
                <option value="projectedPoints">Projected points</option>
                <option value="name">Player name</option>
              </select>
            </label>
          </div>
        </div>
        <div id="dataNotice" class="notice" hidden></div>
        <div class="table-wrap">
          <table id="playersTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <template id="emptyState">
      <tr>
        <td colspan="12" class="empty">No players match that research view.</td>
      </tr>
    </template>

    <div id="tagModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="tagModalTitle" hidden>
      <div class="modal-backdrop" data-close-modal></div>
      <section class="modal-panel">
        <header>
          <div>
            <p>Player Note</p>
            <h2 id="tagModalTitle">Tag Player</h2>
          </div>
          <button class="icon-button" type="button" data-close-modal aria-label="Close">x</button>
        </header>
        <div class="tag-actions">
          <button class="tag-option tag-target" type="button" data-tag-value="target">
            <span class="tag-icon tag-icon-target">⌖</span>
            Target
          </button>
          <button class="tag-option tag-avoid" type="button" data-tag-value="avoid">
            <span class="tag-icon tag-icon-avoid">⊘</span>
            Avoid
          </button>
          <button class="tag-option tag-injured" type="button" data-tag-value="injured">
            <span class="tag-icon tag-icon-injured">✚</span>
            Injured
          </button>
        </div>
        <footer>
          <button class="secondary" type="button" id="clearTag">Clear</button>
          <button class="primary" type="button" data-close-modal>Cancel</button>
        </footer>
      </section>
    </div>

    <script src="app.js?v=2026-07-14-inline-tags" type="module"></script>
  </body>
</html>
