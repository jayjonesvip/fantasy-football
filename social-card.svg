<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">FantasyToolbelt</title>
  <desc id="desc">A crowned football on a grass field for FantasyToolbelt fantasy football rankings and cheat sheets.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset=".62" stop-color="#172235"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#38b66d"/>
      <stop offset=".55" stop-color="#15844e"/>
      <stop offset="1" stop-color="#075f3a"/>
    </linearGradient>
    <linearGradient id="ball" x1=".1" x2=".9" y1=".1" y2=".9">
      <stop offset="0" stop-color="#c9783d"/>
      <stop offset=".48" stop-color="#7c3f18"/>
      <stop offset="1" stop-color="#3f1d0c"/>
    </linearGradient>
    <linearGradient id="crown" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff08a"/>
