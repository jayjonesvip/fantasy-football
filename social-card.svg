      <text x="81" y="37" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="24" font-weight="900">RB</text>
      <text x="259" y="37" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="24" font-weight="900">WR</text>
      <text x="437" y="37" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="24" font-weight="900">QB</text>
