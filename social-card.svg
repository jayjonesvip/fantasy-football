    <path d="M28 268C51 174 161 75 337 57c60 143-21 286-171 339C82 425-3 352 28 268Z" fill="url(#ball)"/>
    <path d="M47 270C130 313 261 244 336 70" fill="none" stroke="#fff7ed" stroke-width="18" stroke-linecap="round"/>
