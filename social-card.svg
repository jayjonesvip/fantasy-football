    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>
  <path d="M0 404c169-57 343-67 522-31 215 43 442 9 678-75v332H0Z" fill="url(#grass)"/>
  <path d="M0 496c177-39 367-45 570-18 201 27 411 3 630-70" fill="none" stroke="#8ef0a9" stroke-width="7" opacity=".38"/>
  <path d="M0 552c196-32 390-33 582-4 205 31 411 16 618-45" fill="none" stroke="#0b4c31" stroke-width="9" opacity=".35"/>

