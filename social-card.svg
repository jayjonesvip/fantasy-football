    <text x="78" y="260" fill="#f8fafc" font-family="Arial, sans-serif" font-size="90" font-weight="900">FantasyToolbelt</text>
    <text x="84" y="334" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="36" font-weight="700">Rankings, projections, player tags, risers, fallers, and printable cheat sheets.</text>
